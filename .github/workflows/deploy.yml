name: Deploy to VPS

on:
  push:
    branches:
      - main  # Якщо твоя гілка в GitHub називається master, заміни на master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Підключення до VPS та оновлення
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Заходимо в папку
            cd /noris/logistic-client-noris
            
            # Підтягуємо код з гіта
            echo "📥 Pulling changes..."
            git pull origin main
            
            # Встановлюємо залежності
            echo "📦 Installing npm packages..."
            npm install
            
            # Запускаємо твій скрипт (prisma generate + build + pm2 restart)
            echo "🚀 Running deploy script..."
            npm run deploy
            
            echo "✅ Всі команди виконано успішно!"