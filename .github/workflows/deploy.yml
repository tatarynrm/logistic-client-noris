name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Підключення до VPS та оновлення
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Зупиняти скрипт, якщо хоч одна команда видасть помилку
            set -e

            # Підвантажуємо змінні оточення (особливо NVM для npm). 
            # Якщо ти встановлював Node не через NVM, а глобально, ці 2 рядки можна прибрати, 
            # але залишаємо 'source ~/.bashrc' як запасний варіант.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            source ~/.bashrc || true

            # Заходимо в папку
            cd /noris/logistic-client-noris
            
            # Примусово робимо код на сервері ідентичним до GitHub (скидаємо конфлікти)
            echo "📥 Fetching and resetting changes..."
            git fetch --all
            git reset --hard origin/main
            
            # Встановлюємо залежності
            echo "📦 Installing npm packages..."
            npm install
            
            # Запускаємо твій скрипт
            echo "🚀 Running deploy script..."
            npm run deploy
            
            echo "✅ Всі команди виконано успішно!"